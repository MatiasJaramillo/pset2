services:
  postgres:
    image: postgres:16
    container_name: nyc_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  mage:
    build:
      context: .
      dockerfile: mage/Dockerfile
    container_name: nyc_mage
    env_file:
      - .env
    ports:
      - "${MAGE_PORT:-6789}:6789"
    depends_on:
      - postgres
    volumes:
      - ./mage_project:/home/src
      - ./dbt:/home/src/dbt
      - ./sql:/home/src/sql

volumes:
  pgdata: